openapi: 3.0.3
info:
  title: Electronic Digital Signature Lab API
  version: "1.1.0"
  description: |
    API for demonstrating electronic digital signature workflows with users,
    JWT authentication, user-managed public keys, audit metadata, document
    signing, encrypted package delivery, and verification.

    Response format note:
    - `/health`, `/api/v1/auth*`, `/api/v1/users*`, and `/api/v1/documents*`
      use the common envelope `{ "success": boolean, "data" | "error": ... }`.
    - `/api/v1/server*` and `/api/v1/signatures/verify` use legacy direct JSON
      response shapes.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Server Keys
  - name: Server Messages
  - name: Signatures
  - name: Documents
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessEnvelope"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessEnvelope"
        "400":
          description: Invalid request or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    success: false
                    error:
                      code: invalid_request
                      message: Request body is invalid.
                emailRequired:
                  value:
                    success: false
                    error:
                      code: email_required
                      message: Email is required.
                passwordRequired:
                  value:
                    success: false
                    error:
                      code: password_required
                      message: Password is required.
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidCredentials:
                  value:
                    success: false
                    error:
                      code: invalid_credentials
                      message: Email or password is incorrect.

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSuccessEnvelope"
        "401":
          description: Authentication is missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingBearer:
                  value:
                    success: false
                    error:
                      code: unauthorized
                      message: Bearer token is required.
                invalidToken:
                  value:
                    success: false
                    error:
                      code: invalid_token
                      message: Access token is invalid.
                expiredToken:
                  value:
                    success: false
                    error:
                      code: token_expired
                      message: Access token has expired.

  /api/v1/users/register:
    post:
      tags: [Users]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSuccessEnvelope"
        "400":
          description: Invalid registration input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicateEmail:
                  value:
                    success: false
                    error:
                      code: email_already_exists
                      message: User with this email already exists.
                invalidPublicKey:
                  value:
                    success: false
                    error:
                      code: invalid_public_key
                      message: Public key PEM is invalid.

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSuccessEnvelope"
        "400":
          description: Missing user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/me/public-key:
    put:
      tags: [Users]
      summary: Update current user public key
      description: |
        Replaces the current user's active public key with a new PEM-encoded
        ECDSA public key and appends the key to history.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyPublicKeyRequest"
      responses:
        "200":
          description: Public key updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSuccessEnvelope"
        "400":
          description: Invalid key or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPublicKey:
                  value:
                    success: false
                    error:
                      code: invalid_public_key
                      message: Public key PEM is invalid.
                keyRequired:
                  value:
                    success: false
                    error:
                      code: public_key_required
                      message: Public key PEM is required.
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /api/v1/server/public-key:
    get:
      tags: [Server Keys]
      summary: Get server public key
      responses:
        "200":
          description: Server public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerPublicKeyResponse"
        "500":
          description: Server public key is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"

  /api/v1/server/messages:
    post:
      tags: [Server Messages]
      summary: Create server-signed message
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueServerMessageRequest"
      responses:
        "200":
          description: Message signed by server key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueServerMessageResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"
        "401":
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server private key missing or internal issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"

  /api/v1/server/messages/{id}:
    get:
      tags: [Server Messages]
      summary: Get previously created server-signed message
      parameters:
        - $ref: "#/components/parameters/MessageID"
      responses:
        "200":
          description: Signed message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueServerMessageResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyErrorResponse"

  /api/v1/signatures/verify:
    post:
      tags: [Signatures]
      summary: Verify arbitrary user signature by provided public key
      description: |
        Demo endpoint for verifying a signature against a plain-text message and
        an explicitly supplied PEM-encoded public key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyClientSignatureRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyClientSignatureResponse"
        "400":
          description: Invalid body or malformed base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyClientSignatureResponse"

  /api/v1/users/me/signatures/verify:
    post:
      tags: [Signatures]
      summary: Verify signature using current user's registered public key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyUserSignatureRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyClientSignatureResponse"
              examples:
                valid:
                  value:
                    valid: true
                    signer_type: user
                    signer_user_id: user-id
                invalid:
                  value:
                    valid: false
                    signer_type: user
                    signer_user_id: user-id
                    error: invalid signature
        "400":
          description: Current user has no key or request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyClientSignatureResponse"
              examples:
                noRegisteredKey:
                  value:
                    valid: false
                    signer_type: user
                    signer_user_id: user-id
                    error: current user does not have a registered public key
        "401":
          $ref: "#/components/responses/UnauthorizedLegacyVerificationResponse"

  /api/v1/documents:
    post:
      tags: [Documents]
      summary: Upload document as current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, recipient_email]
              properties:
                recipient_email:
                  type: string
                  format: email
                file:
                  type: string
                  format: binary
                  description: DOCX file up to 10 MiB
      responses:
        "201":
          description: Document uploaded and signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDocumentSuccessEnvelope"
        "400":
          description: Invalid upload input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /api/v1/documents/{id}/send:
    post:
      tags: [Documents]
      summary: Send encrypted document package by email
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendDocumentRequest"
      responses:
        "200":
          description: Document package sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendDocumentSuccessEnvelope"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Document belongs to another user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    success: false
                    error:
                      code: forbidden
                      message: You do not have access to this document.
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/documents/{id}/audit:
    get:
      tags: [Documents]
      summary: Get document audit summary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DocumentID"
      responses:
        "200":
          description: Audit information for the document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentAuditSuccessEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          description: Document belongs to another user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/documents/verify-decrypt:
    post:
      tags: [Documents]
      summary: Verify and decrypt encrypted package
      description: |
        Public laboratory endpoint. Accepts an encrypted package either as raw
        JSON or multipart file, decrypts the document, verifies the server
        signature, and returns decrypted content only if the signature is valid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptedPackage"
          multipart/form-data:
            schema:
              type: object
              properties:
                package:
                  type: string
                  format: binary
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Package is valid and document decrypted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDecryptPackageSuccessEnvelope"
        "400":
          description: Invalid package or signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Send access token in `Authorization` header:
        `Authorization: Bearer <jwt>`.

  responses:
    UnauthorizedResponse:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missingBearer:
              value:
                success: false
                error:
                  code: unauthorized
                  message: Bearer token is required.
            invalidToken:
              value:
                success: false
                error:
                  code: invalid_token
                  message: Access token is invalid.
    UnauthorizedLegacyVerificationResponse:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VerifyClientSignatureResponse"
          examples:
            unauthorized:
              value:
                valid: false
                error: authentication is required

  parameters:
    DocumentID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Document identifier
    MessageID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Message identifier
    UserID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: User identifier

  schemas:
    ErrorDetails:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/ErrorDetails"
    LegacyErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    HealthSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/HealthData"

    RegisterUserRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
        public_key_pem:
          $ref: "#/components/schemas/PEMString"
    UpdateMyPublicKeyRequest:
      type: object
      required: [public_key_pem]
      properties:
        public_key_pem:
          $ref: "#/components/schemas/PEMString"
    UserResponse:
      type: object
      required: [id, email, name, created_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        public_key_pem:
          allOf:
            - $ref: "#/components/schemas/PEMString"
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/UserResponse"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [access_token, token_type, expires_at, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserResponse"
    LoginSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/LoginResponse"

    VerifyClientSignatureRequest:
      type: object
      required: [message, signature_base64, public_key]
      properties:
        message:
          type: string
        signature_base64:
          $ref: "#/components/schemas/Base64String"
        public_key:
          $ref: "#/components/schemas/PEMString"
    VerifyUserSignatureRequest:
      type: object
      required: [message, signature_base64]
      properties:
        message:
          type: string
        signature_base64:
          $ref: "#/components/schemas/Base64String"
    VerifyClientSignatureResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        signer_type:
          type: string
          enum: [server, user]
        signer_user_id:
          type: string
        error:
          type: string

    ServerPublicKeyResponse:
      type: object
      required: [algorithm, public_key_pem]
      properties:
        algorithm:
          type: string
          example: ECDSA-SHA256
        public_key_pem:
          $ref: "#/components/schemas/PEMString"

    IssueServerMessageRequest:
      type: object
      properties:
        message:
          type: string
          description: Optional custom message
    IssueServerMessageResponse:
      type: object
      required:
        - message_id
        - signer_type
        - created_at
        - message
        - algorithm
        - hash_base64
        - signature_base64
      properties:
        message_id:
          type: string
        signer_type:
          type: string
          enum: [server]
        signer_user_id:
          type: string
          nullable: true
        created_by_user_id:
          type: string
        created_at:
          type: string
          format: date-time
        message:
          type: string
        algorithm:
          type: string
          example: ECDSA-SHA256
        hash_base64:
          $ref: "#/components/schemas/Base64String"
        signature_base64:
          $ref: "#/components/schemas/Base64String"

    UploadDocumentResponse:
      type: object
      required:
        - document_id
        - owner_user_id
        - signed_by_user_id
        - owner_email
        - recipient_email
        - original_file_name
        - stored_path
        - mime_type
        - created_at
      properties:
        document_id:
          type: string
        owner_user_id:
          type: string
        signed_by_user_id:
          type: string
        owner_email:
          type: string
          format: email
        recipient_email:
          type: string
          format: email
        original_file_name:
          type: string
        stored_path:
          type: string
        mime_type:
          type: string
        created_at:
          type: string
          format: date-time
    UploadDocumentSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/UploadDocumentResponse"

    SendDocumentRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    SendDocumentResponse:
      type: object
      required:
        - document_id
        - owner_user_id
        - signed_by_user_id
        - package_id
        - recipient_email
        - send_status
      properties:
        document_id:
          type: string
        owner_user_id:
          type: string
        signed_by_user_id:
          type: string
        sent_by_user_id:
          type: string
        package_id:
          type: string
        recipient_email:
          type: string
          format: email
        send_status:
          type: string
          enum: [sent, failed]
        sent_at:
          type: string
          format: date-time
          nullable: true
    SendDocumentSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/SendDocumentResponse"

    DocumentAuditResponse:
      type: object
      required:
        - document_id
        - owner_user_id
        - signed_by_user_id
        - owner_email
        - recipient_email
        - original_file_name
        - mime_type
        - created_at
        - signed_at
      properties:
        document_id:
          type: string
        owner_user_id:
          type: string
        signed_by_user_id:
          type: string
        sent_by_user_id:
          type: string
        owner_email:
          type: string
          format: email
        recipient_email:
          type: string
          format: email
        original_file_name:
          type: string
        mime_type:
          type: string
        send_status:
          type: string
        created_at:
          type: string
          format: date-time
        signed_at:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time
          nullable: true
    DocumentAuditSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/DocumentAuditResponse"

    VerifyDecryptPackageMetadata:
      type: object
      required:
        - document_id
        - version
        - encryption_algorithm
        - key_transport
        - signature_algorithm
        - original_file_name
        - mime_type
        - hash_base64
      properties:
        document_id:
          type: string
        version:
          type: string
        encryption_algorithm:
          type: string
          example: AES-256-GCM
        key_transport:
          type: string
          example: plaintext_demo
        signature_algorithm:
          type: string
          example: ECDSA-SHA256
        original_file_name:
          type: string
        mime_type:
          type: string
        hash_base64:
          $ref: "#/components/schemas/Base64String"
    VerifyDecryptPackageResponse:
      type: object
      required: [valid, metadata, decrypted_document_base64]
      properties:
        valid:
          type: boolean
          enum: [true]
        metadata:
          $ref: "#/components/schemas/VerifyDecryptPackageMetadata"
        decrypted_document_base64:
          $ref: "#/components/schemas/Base64String"
    VerifyDecryptPackageSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/VerifyDecryptPackageResponse"

    EncryptedPackage:
      type: object
      required:
        - version
        - document_id
        - encryption_algorithm
        - key_transport
        - encrypted_key_base64
        - nonce_base64
        - ciphertext_base64
        - signature_base64
        - hash_base64
        - signature_algorithm
        - original_file_name
        - mime_type
      properties:
        version:
          type: string
        document_id:
          type: string
        encryption_algorithm:
          type: string
          example: AES-256-GCM
        key_transport:
          type: string
          example: plaintext_demo
        encrypted_key_base64:
          $ref: "#/components/schemas/Base64String"
        nonce_base64:
          $ref: "#/components/schemas/Base64String"
        ciphertext_base64:
          $ref: "#/components/schemas/Base64String"
        signature_base64:
          $ref: "#/components/schemas/Base64String"
        hash_base64:
          $ref: "#/components/schemas/Base64String"
        signature_algorithm:
          type: string
          example: ECDSA-SHA256
        original_file_name:
          type: string
        mime_type:
          type: string

    Base64String:
      type: string
      format: byte
      description: Standard RFC 4648 base64 string
      example: SGVsbG8=
    PEMString:
      type: string
      description: |
        PEM-encoded ECDSA public key with BEGIN/END markers and embedded
        newlines.
      example: |
